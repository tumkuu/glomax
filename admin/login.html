<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff8c00" />
    <title>Админ нэвтрэх — GloMax</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Rubik:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/css/admin.css" />
  </head>
  <body class="login-page">
    <div class="login-card">
      <div class="brand">
        <span class="brand-mark">G</span>
        <span>GloMax Admin</span>
      </div>
      <h1>Нэвтрэх</h1>
      <p class="sub">Зөвхөн админ эрхтэй хэрэглэгч нэвтэрнэ.</p>

      <div class="alert alert--error" id="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Нэвтрэх нэр</label>
          <input id="username" name="username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Нууц үг</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" class="btn btn--primary btn--block">Нэвтрэх</button>
      </form>
    </div>

    <script src="/admin/js/login.js"></script>
  </body>
</html>
